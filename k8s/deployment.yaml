apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: blog
  labels:
    app: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog
  template:
    metadata:
      labels:
        app: blog
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: site-content
              mountPath: /git
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          env:
            - name: GITSYNC_REPO
              value: https://github.com/neocode24/portfolio.git
            - name: GITSYNC_REF
              value: gh-pages
            - name: GITSYNC_PERIOD
              value: "60s"
            - name: GITSYNC_DEPTH
              value: "1"
            - name: GITSYNC_ROOT
              value: /git
          volumeMounts:
            - name: site-content
              mountPath: /git
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

      volumes:
        - name: site-content
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
